name: CD

# Deployment pipeline. Runs the reusable quality gate first, then deploys to
# Vercel only if the gate passes:
#   - push to main        -> Production
#   - push to development  -> Preview (staging)
#   - pull request         -> Preview (ephemeral, one URL per PR)
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# A new push to the same ref cancels the in-flight deploy for that ref.
concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Gate: reuses .github/workflows/ci.yml (lint, typecheck, test, audit, build).
  quality-gate:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Vercel
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The Vercel CLI reads these from the environment to identify the project.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # On pull_request, checkout defaults to an ephemeral merge commit. We pin
      # the PR branch's real HEAD so the deployed code and the git metadata below
      # reference the actual commit, not "Merge X into Y".
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # `vercel build` shells out to pnpm to install deps, so pnpm must be on
      # PATH in this job (it does not inherit it from the quality-gate job).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # main -> production deploy; everything else (development, PRs) -> preview.
      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      # Pulls the project settings AND env vars for this environment FROM Vercel.
      # This is why app secrets live in Vercel, not in GitHub.
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      # DATABASE_URL and JWT_SECRET are marked Sensitive in Vercel, so they are
      # NOT downloaded by `vercel pull`. The build never connects to the DB, it
      # only needs these to pass the zod validation in src/lib/env.ts. Vercel
      # injects the REAL Sensitive values at runtime, where the app reads
      # process.env, so these placeholders never reach production.
      - name: Build project artifacts
        env:
          DATABASE_URL: mongodb://ci:ci@localhost:27017/ci?authSource=admin
          JWT_SECRET: ci-build-placeholder-secret-not-a-real-key-000
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      # CLI deploys have no Git context on their own, so we attach it explicitly.
      # These github* meta keys make Vercel show the branch, commit, author and a
      # link in the dashboard instead of the raw merge commit.
      - name: Deploy to Vercel
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF="${{ github.event.pull_request.head.ref }}"
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            REF="${{ github.ref_name }}"
            SHA="${{ github.sha }}"
          fi
          MSG="$(git log -1 --pretty=%s)"
          AUTHOR="$(git log -1 --pretty=%an)"
          vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitRef="$REF" \
            --meta githubCommitSha="$SHA" \
            --meta githubCommitMessage="$MSG" \
            --meta githubCommitAuthorName="$AUTHOR" \
            --meta githubOrg="${{ github.repository_owner }}" \
            --meta githubRepo="${{ github.event.repository.name }}" \
            --meta githubDeployment=1
